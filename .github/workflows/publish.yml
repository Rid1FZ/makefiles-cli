name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  zipapp:
    name: Build zipapp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Build zipapp
        run: python3 scripts/build-zipapp.py

      - name: Upload zipapp artifact
        uses: actions/upload-artifact@v4
        with:
          name: zipapp
          path: build/zipapp/mkfile

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: pypi
      url: https://pypi.org/p/makefiles-cli

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: zipapp

    permissions:
      contents: write

    steps:
      - name: Download zipapp artifact
        uses: actions/download-artifact@v4
        with:
          name: zipapp
          path: .

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            mkfile
